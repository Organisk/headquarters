---
- name: Set hostname
  become: true
  ansible.builtin.hostname:
    name: "{{ hostname }}"

- name: Set hostname in /etc/hostname
  become: true
  ansible.builtin.copy:
    content: "{{ hostname }}\n"
    dest: /etc/hostname

