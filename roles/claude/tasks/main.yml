---
- name: Create claude user
  become: true
  ansible.builtin.user:
    name: "{{ claude_user }}"
    create_home: true
    groups: "{{ claude_groups }}"
    shell: "{{ claude_shell }}"
    comment: "Claude AI agent"

- name: Grant claude passwordless sudo
  become: true
  ansible.builtin.lineinfile:
    path: "/etc/sudoers.d/20-{{ claude_user }}"
    line: "{{ claude_user }} ALL=(ALL) NOPASSWD:ALL"
    create: true
    mode: '0440'
    validate: 'visudo -cf %s'

- name: Create home directory structure
  become: true
  become_user: "{{ claude_user }}"
  ansible.builtin.file:
    path: "/home/{{ claude_user }}/{{ item }}"
    state: directory
    mode: '0750'
  loop:
    - .claude
    - .config
    - projects
