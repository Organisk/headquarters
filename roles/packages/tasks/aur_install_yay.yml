---
- name: Check if yay is installed
  ansible.builtin.command:
    cmd: pacman -Qi yay
  register: yay_check
  changed_when: false
  failed_when: false

- name: Install yay
  when: yay_check.rc != 0
  become: true
  become_user: aur_builder
  block:
    - name: Clone yay
      ansible.builtin.git:
        repo: https://aur.archlinux.org/yay.git
        dest: /tmp/yay-build
        version: master

    - name: Build and install yay
      ansible.builtin.command:
        cmd: makepkg -si --noconfirm
        chdir: /tmp/yay-build

    - name: Clean up yay build
      ansible.builtin.file:
        path: /tmp/yay-build
        state: absent
