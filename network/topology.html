  .sidebar {
    width: 320px;

    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .sidebar h1 {
    font-size: 15px;
    padding: 16px;
    border-bottom: 1px solid #1e293b;
    color: #e2e8f0;
    letter-spacing: 0.5px;
  }
  .sidebar h1 span { color: #60a5fa; }

  /* Filters */
  .filter-section {
    padding: 12px 16px;
    border-bottom: 1px solid #1e293b;
  }
  .filter-section h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #64748b;
    margin-bottom: 8px;
  }
  .filter-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    cursor: pointer;
    font-size: 13px;
  }
  .filter-row:hover { color: #e2e8f0; }
  .filter-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .filter-row input[type="checkbox"] {
    display: none;
  }
  .filter-row.unchecked {
    opacity: 0.35;
  }
  .filter-row.unchecked .filter-dot {
    opacity: 0.3;
  }

  /* Stats */
  .stats {
    padding: 12px 16px;
    border-bottom: 1px solid #1e293b;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .stat {
    background: #1e293b;
    border-radius: 6px;
    padding: 8px 10px;
  }
  .stat-val {
    font-size: 20px;
    font-weight: 700;
    color: #e2e8f0;
  }
  .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #64748b;
  }

  /* Detail panel */
  .detail-panel {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
  }
  .detail-panel.empty {
    display: flex;
    align-items: center;
    justify-content: center;
    color: #475569;
    font-size: 13px;
    font-style: italic;
  }
  .detail-title {
    font-size: 16px;
    font-weight: 700;
    color: #e2e8f0;
    margin-bottom: 4px;
  }
  .detail-subtitle {
    font-size: 12px;
    color: #64748b;
    margin-bottom: 12px;
  }
  .detail-table {
    width: 100%;
    font-size: 12px;
  }
  .detail-table td {
    padding: 4px 0;
    border-bottom: 1px solid #1e293b;
    vertical-align: top;
  }
  .detail-table td:first-child {
    color: #64748b;
    width: 80px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 11px;
  }
  .tag {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    margin: 1px 2px;
  }

  /* Canvas area */
  .canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* Legend overlay */
  .legend {
    position: absolute;
    bottom: 16px;
    right: 16px;
    background: rgba(17, 24, 39, 0.92);
    border: 1px solid #1e293b;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 11px;
  }
  .legend-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 2px 0;
  }
  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  /* Tailscale toggle */
  .ts-toggle {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(17, 24, 39, 0.92);
    border: 1px solid #1e293b;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 12px;
    cursor: pointer;
    user-select: none;
    transition: border-color 0.2s;
  }
  .ts-toggle:hover { border-color: #7c3aed; }
  .ts-toggle.active { border-color: #7c3aed; color: #a78bfa; }

  .search-wrap {
    padding: 12px 16px;
    border-bottom: 1px solid #1e293b;
  }
  .search-wrap input {
    width: 100%;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 6px;
    padding: 6px 10px;
    color: #e2e8f0;
    font-size: 13px;
    outline: none;
  }
  .search-wrap input:focus { border-color: #60a5fa; }
  .search-wrap input::placeholder { color: #475569; }

// ── Layout ────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  W = rect.width;
  H = rect.height;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// Subnet cluster positions (will be computed)
let subnetPositions = {};
let hostPositions = {};
let tsNodePositions = {};

function layoutSubnets() {
  const cx = W / 2, cy = H / 2;
  const keys = Object.keys(SUBNETS);
  // Arrange in a circle, largest subnets get more space
  const angles = {
    '10.10.0': -Math.PI/2,
    '10.10.1': -Math.PI/6,
    '10.10.2': Math.PI/6,
    '10.10.4': Math.PI * 2/3,
    '10.10.20': Math.PI * 5/6,
    '10.10.22': Math.PI,
    '10.10.99': -Math.PI * 5/6,
  };
  const radiusFromCenter = Math.min(W, H) * 0.3;

  keys.forEach(k => {
    const a = angles[k] || 0;
    const hostCount = hosts.filter(h => h.subnet === k).length;
    const r = Math.max(40, Math.sqrt(hostCount) * 22);
    subnetPositions[k] = {
      x: cx + Math.cos(a) * radiusFromCenter,
      y: cy + Math.sin(a) * radiusFromCenter,
      r: r,
    };
  });

  // Layout hosts within each subnet cluster
  hostPositions = {};
  keys.forEach(k => {
    const sp = subnetPositions[k];
    const subHosts = hosts.filter(h => h.subnet === k);
    const n = subHosts.length;
    if (n === 0) return;
    if (n === 1) {
      hostPositions[subHosts[0].ip] = { x: sp.x, y: sp.y };
      return;
    }
    // Spiral layout
    subHosts.forEach((h, i) => {
      const a = (i / n) * Math.PI * 2 + (i * 0.3);
      const dist = Math.min(sp.r - 8, 12 + i * (sp.r / (n + 2)));
      hostPositions[h.ip] = {
        x: sp.x + Math.cos(a) * dist * 0.7,
        y: sp.y + Math.sin(a) * dist * 0.7,
      };
    });
  });

  // Tailscale node positions
  tsNodePositions = {};
  const tsR = Math.min(W, H) * 0.12;
  tailscaleNodes.forEach((n, i) => {
    const a = (i / tailscaleNodes.length) * Math.PI * 2 - Math.PI/2;
    tsNodePositions[n.ip] = {
      x: cx + Math.cos(a) * tsR,
      y: cy + Math.sin(a) * tsR,
    };
  });
}

// ── Render ─────────────────────────────────────────────────────────────
function getVisibleHosts() {
  return hosts.filter(h => {
    if (!state.typeFilters[h.type]) return false;
    if (!state.subnetFilters[h.subnet]) return false;
    if (state.search) {
      const q = state.search.toLowerCase();
      return h.ip.includes(q) || h.name.toLowerCase().includes(q) ||
             h.notes.toLowerCase().includes(q) || h.os.toLowerCase().includes(q) ||
             h.services.some(s => s.toLowerCase().includes(q));
    }
    return true;
  });
}

function render() {
  ctx.save();
  ctx.clearRect(0, 0, W, H);

  // Apply pan and zoom
  ctx.translate(W/2 + state.pan.x, H/2 + state.pan.y);
  ctx.scale(state.zoom, state.zoom);
  ctx.translate(-W/2, -H/2);

  const visible = getVisibleHosts();
  const visibleIPs = new Set(visible.map(h => h.ip));

  // Draw subnet bubbles
  Object.entries(SUBNETS).forEach(([k, s]) => {
    if (!state.subnetFilters[k]) return;
    const sp = subnetPositions[k];
    if (!sp) return;

    ctx.beginPath();
    ctx.arc(sp.x, sp.y, sp.r + 10, 0, Math.PI * 2);
    ctx.fillStyle = s.color + '0a';
    ctx.fill();
    ctx.strokeStyle = s.color + '30';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Subnet label
    ctx.fillStyle = s.color + '90';
    ctx.font = '10px -apple-system, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(s.label, sp.x, sp.y - sp.r - 14);
    ctx.fillStyle = s.color + '60';
    ctx.font = '9px -apple-system, system-ui, sans-serif';
    ctx.fillText(s.desc, sp.x, sp.y - sp.r - 3);
  });

  // Draw inter-subnet connections (gateways)
  const gatewaySubnets = Object.keys(SUBNETS);
  ctx.strokeStyle = '#1e293b';
  ctx.lineWidth = 1;
  // Connect subnets that share a router (LFG routes 0,1,2,99)
  const lfgSubnets = ['10.10.0', '10.10.1', '10.10.2', '10.10.99'];
  for (let i = 0; i < lfgSubnets.length; i++) {
    for (let j = i + 1; j < lfgSubnets.length; j++) {
      const a = subnetPositions[lfgSubnets[i]];
      const b = subnetPositions[lfgSubnets[j]];
      if (!a || !b) continue;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
    }
  }

  // Tailscale overlay
  if (state.showTailscale) {
    // Draw TS links to subnets
    tailscaleLinks.forEach(([tsIp, subnetKey]) => {
      const tp = tsNodePositions[tsIp];
      const sp = subnetPositions[subnetKey];
      if (!tp || !sp) return;
      ctx.beginPath();
      ctx.setLineDash([4, 4]);
      ctx.strokeStyle = '#7c3aed40';
      ctx.lineWidth = 1.5;
      ctx.moveTo(tp.x, tp.y);
      ctx.lineTo(sp.x, sp.y);
      ctx.stroke();
      ctx.setLineDash([]);
    });

    // Draw TS mesh
    ctx.strokeStyle = '#7c3aed20';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < tailscaleNodes.length; i++) {
      for (let j = i + 1; j < tailscaleNodes.length; j++) {
        const a = tsNodePositions[tailscaleNodes[i].ip];
        const b = tsNodePositions[tailscaleNodes[j].ip];
        if (!a || !b) continue;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    }

    // Draw TS nodes
    tailscaleNodes.forEach(n => {
      const p = tsNodePositions[n.ip];
      if (!p) return;
      const col = n.role === 'router' ? '#7c3aed' : n.role === 'exit-node' ? '#a78bfa' : n.role === 'control' ? '#c084fc' : '#6366f1';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
      ctx.fillStyle = col + '80';
      ctx.fill();
      ctx.strokeStyle = col;
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Diamond shape for routers
      if (n.role === 'router' || n.role === 'exit-node') {
        ctx.beginPath();
        ctx.moveTo(p.x, p.y - 8);
        ctx.lineTo(p.x + 6, p.y);
        ctx.lineTo(p.x, p.y + 8);
        ctx.lineTo(p.x - 6, p.y);
        ctx.closePath();
        ctx.strokeStyle = col;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.fillStyle = col + '30';
        ctx.fill();
      }

      ctx.fillStyle = '#a78bfa';
      ctx.font = '9px -apple-system, system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(n.name, p.x, p.y + 16);
      ctx.fillStyle = '#6366f180';
      ctx.font = '8px monospace';
      ctx.fillText(n.ip, p.x, p.y + 25);
    });
  }

  // Draw hosts
  visible.forEach(h => {
    const p = hostPositions[h.ip];
    if (!p) return;
    const t = TYPES[h.type] || TYPES.unknown;
    const isSelected = state.selected === h.ip;
    const isHovered = state.hovered === h.ip;
    const r = h.highlight ? 7 : (h.type === 'firewall' || h.type === 'hypervisor') ? 6 : 4;

    // Glow for highlighted/selected
    if (isSelected || h.highlight) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, r + 8, 0, Math.PI * 2);
      const grad = ctx.createRadialGradient(p.x, p.y, r, p.x, p.y, r + 8);
      grad.addColorStop(0, (isSelected ? '#ffffff' : t.color) + '40');
      grad.addColorStop(1, (isSelected ? '#ffffff' : t.color) + '00');
      ctx.fillStyle = grad;
      ctx.fill();
    }

    // Host dot
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fillStyle = isSelected ? '#ffffff' : isHovered ? t.color : t.color + 'cc';
    ctx.fill();

    if (isSelected || isHovered) {
      ctx.strokeStyle = '#ffffff60';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Label (only for named/important hosts or when zoomed in)
    if (h.name && h.name !== `.${h.ip.split('.').pop()}` || state.zoom > 1.3 || isSelected || isHovered) {
      const label = h.name.startsWith('.') && state.zoom < 1.3 && !isSelected && !isHovered ? '' : h.name;
      if (label) {
        ctx.fillStyle = isSelected || isHovered ? '#e2e8f0' : '#94a3b8';
        ctx.font = `${isSelected || isHovered ? '11' : '9'}px -apple-system, system-ui, sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillText(label, p.x, p.y - r - 4);
      }
    }

    // Show IP on hover/select
    if (isSelected || isHovered) {
      ctx.fillStyle = '#64748b';
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(h.ip, p.x, p.y + r + 11);
    }
  });

  ctx.restore();
}

// ── Interaction ───────────────────────────────────────────────────────
function screenToWorld(sx, sy) {
  return {
    x: (sx - W/2 - state.pan.x) / state.zoom + W/2,
    y: (sy - H/2 - state.pan.y) / state.zoom + H/2,
  };
}

function findHostAt(sx, sy) {
  const w = screenToWorld(sx, sy);
  let closest = null, closestDist = 15;
  hosts.forEach(h => {
    if (!state.typeFilters[h.type] || !state.subnetFilters[h.subnet]) return;
    const p = hostPositions[h.ip];
    if (!p) return;
    const d = Math.hypot(p.x - w.x, p.y - w.y);
    if (d < closestDist) {
      closestDist = d;
      closest = h;
    }
  });
  return closest;
}

canvas.addEventListener('mousedown', e => {
  state.dragging = true;
  state.dragStart = { x: e.clientX - state.pan.x, y: e.clientY - state.pan.y };
  state.dragMoved = false;
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  if (state.dragging) {
    const nx = e.clientX - state.dragStart.x;
    const ny = e.clientY - state.dragStart.y;
    if (Math.abs(nx - state.pan.x) > 3 || Math.abs(ny - state.pan.y) > 3) state.dragMoved = true;
    state.pan.x = nx;
    state.pan.y = ny;
    render();
    return;
  }

  const h = findHostAt(mx, my);
  const newHovered = h ? h.ip : null;
  if (newHovered !== state.hovered) {
    state.hovered = newHovered;
    canvas.style.cursor = h ? 'pointer' : 'grab';
    render();
  }
});

canvas.addEventListener('mouseup', e => {
  if (!state.dragMoved) {
    const rect = canvas.getBoundingClientRect();
    const h = findHostAt(e.clientX - rect.left, e.clientY - rect.top);
    selectHost(h);
  }
  state.dragging = false;
  state.dragMoved = false;
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  state.zoom = Math.max(0.3, Math.min(5, state.zoom * factor));
  render();
}, { passive: false });

// ── Selection ─────────────────────────────────────────────────────────
function selectHost(h) {
  const panel = document.getElementById('detail');
  if (!h) {
    state.selected = null;
    panel.className = 'detail-panel empty';
    panel.innerHTML = 'Click a host to see details';
    render();
    return;
  }
  state.selected = h.ip;
  const t = TYPES[h.type] || TYPES.unknown;
  const sn = SUBNETS[h.subnet] || {};

  panel.className = 'detail-panel';
  panel.innerHTML = `
    <div class="detail-title" style="color:${t.color}">${h.name || h.ip}</div>
    <div class="detail-subtitle">${h.ip}</div>
    <table class="detail-table">
      <tr><td>type</td><td><span class="tag" style="background:${t.color}20;color:${t.color}">${t.label}</span></td></tr>
      <tr><td>subnet</td><td><span class="tag" style="background:${sn.color}20;color:${sn.color}">${sn.label || h.subnet}</span> ${sn.desc || ''}</td></tr>
      ${h.os ? `<tr><td>os</td><td>${h.os}</td></tr>` : ''}
      ${h.ssh ? `<tr><td>ssh</td><td style="font-family:monospace;font-size:11px">${h.ssh}</td></tr>` : ''}
      ${h.services.length ? `<tr><td>services</td><td>${h.services.map(s => `<span class="tag" style="background:#1e293b;color:#94a3b8">${s}</span>`).join(' ')}</td></tr>` : ''}
      ${h.notes ? `<tr><td>notes</td><td>${h.notes}</td></tr>` : ''}
    </table>
  `;
  render();
}

// ── Filters ───────────────────────────────────────────────────────────
function buildFilters() {
  const tf = document.getElementById('type-filters');
  tf.innerHTML = '';
  Object.entries(TYPES).forEach(([k, t]) => {
    const count = hosts.filter(h => h.type === k).length;
    if (count === 0) return;
    const row = document.createElement('div');
    row.className = 'filter-row' + (state.typeFilters[k] ? '' : ' unchecked');
    row.innerHTML = `<div class="filter-dot" style="background:${t.color}"></div>${t.label} <span style="color:#475569;margin-left:auto;font-size:11px">${count}</span>`;
    row.onclick = () => {
      state.typeFilters[k] = !state.typeFilters[k];
      row.className = 'filter-row' + (state.typeFilters[k] ? '' : ' unchecked');
      updateStats();
      render();
    };
    tf.appendChild(row);
  });

  const sf = document.getElementById('subnet-filters');
  sf.innerHTML = '';
  Object.entries(SUBNETS).forEach(([k, s]) => {
    const count = hosts.filter(h => h.subnet === k).length;
    const row = document.createElement('div');
    row.className = 'filter-row' + (state.subnetFilters[k] ? '' : ' unchecked');
    row.innerHTML = `<div class="filter-dot" style="background:${s.color}"></div>${s.label} <span style="color:#475569;margin-left:auto;font-size:11px">${count}</span>`;
    row.onclick = () => {
      state.subnetFilters[k] = !state.subnetFilters[k];
      row.className = 'filter-row' + (state.subnetFilters[k] ? '' : ' unchecked');
      updateStats();
      render();
    };
    sf.appendChild(row);
  });
}

function buildLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = Object.entries(TYPES)
    .filter(([k]) => hosts.some(h => h.type === k))
    .map(([k, t]) => `<div class="legend-row"><div class="legend-dot" style="background:${t.color}"></div>${t.label}</div>`)
    .join('');
}

function updateStats() {
  const vis = getVisibleHosts();
  document.getElementById('stat-hosts').textContent = vis.length;
  document.getElementById('stat-services').textContent = vis.reduce((a, h) => a + h.services.length, 0);
  document.getElementById('stat-offline').textContent = vis.filter(h => h.type === 'offline').length;
}

function toggleTailscale() {
  state.showTailscale = !state.showTailscale;
  document.getElementById('tsToggle').className = 'ts-toggle' + (state.showTailscale ? ' active' : '');
  render();
}

// Search
document.getElementById('search').addEventListener('input', e => {
  state.search = e.target.value;
  updateStats();
  render();
});

// ── Init ──────────────────────────────────────────────────────────────
function init() {
  resize();
  layoutSubnets();
  buildFilters();
  buildLegend();
  updateStats();
  render();
}

window.addEventListener('resize', () => {
  resize();
  layoutSubnets();
  render();
});

init();
</script>
