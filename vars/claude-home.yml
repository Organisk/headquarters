---
hostname: "claude-home"

# packages
packages:
  # core
  - base-devel
  - git
  - github-cli
  - openssh
  - gnupg
  - pinentry
  - zsh
  - tmux
  - sudo
  # editors
  - vim
  # cli tools
  - curl
  - wget
  - jq
  - yq
  - fd
  - ripgrep
  - fzf
  - bat
  - tree
  - zoxide
  - less
  - unzip
  - zip
  - direnv
  - just
  - chezmoi
  - inetutils
  # languages & runtimes
  - python
  - python-uv
  - python-yaml
  - python-jinja
  - nodejs
  - go
  # ansible
  - ansible
  - ansible-core
  # network & diagnostics
  - nmap
  - rsync
  - lsof
  - strace
  - btop
  - htop
  # containers
  - podman
  # tailscale (backup connectivity)
  - tailscale

aur_packages:
  - claude-code
  - lazygit
  - neovim-nightly
  - oh-my-zsh-git

# tailscale
headscale_url: "https://hs.aldervall.se"
tailscale_hostname: "claude-home"

# claude user
claude_user: "claude"
claude_shell: /bin/zsh
claude_groups:
  - wheel
